          type: integer
          format: int32
        deadline:
          type: string
          format: date-time
        purpose:
          type: string
        deleted:
          type: integer
          format: int32
        itemName:
          type: string
        pricePerUnit:
          type: number
        communityName:
          type: integer
          format: int32
        requesteeUser:
          type: string
    Expense:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        quantity:
          type: integer
          format: int32
        purpose:
          type: string
        vendor:
          type: string
        link:
          type: string
        community:
          type: integer
          format: int32
        deleted:
          type: integer
          format: int32
        deliberationDeadline:
          type: string
          format: date-time
        reimbursementDeadline:
          type: string
          format: date-time
        totalPrice:
          type: number
        sourceId:
          type: integer
          format: int32
        foodFlag:
          type: integer
          format: int32
        totalSpent:
          type: number
        paymentType:
          type: string
        pricePerUnit:
          type: number
        itemDeadline:
          type: string
          format: date-time
        requestedFlag:
          type: integer
          format: int32
        approvedFlag:
          type: integer
          format: int32
        startedBuyingFlag:
          type: integer
          format: int32
        finishedBuyingFlag:
          type: integer
          format: int32
        pickedUpFlag:
          type: integer
          format: int32
        reimbursedFlag:
          type: integer
          format: int32
        moneyRemaining:
          type: number
        pickupLocation:
          type: string
        allocationDeadline:
          type: string
          format: date-time
        eventId:
          type: integer
          format: int32
          writeOnly: true
    Event:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        date:
          type: string
          format: date-time
        location:
          type: string
        deleted:
          type: integer
          format: int32
